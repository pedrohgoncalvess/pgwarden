      #   interval: 1800
      #   enabled: true
      # index_collector:
      #   interval: 1800
      #   enabled: true
      # table_metric_collector:
      #   interval: 1800
      #   enabled: true
      # column_metric_collector:
      #   interval: 1800
      #   enabled: true
      # index_metric_collector:
      #   interval: 1800
      #   enabled: true
