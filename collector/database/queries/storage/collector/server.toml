[INSERT]
default = """
INSERT INTO "collector"."server" (
    name, host, port, username, password, ssl_mode,
    ignore_patterns, ignore_tables, include_tables
) VALUES (
    %(name)s, %(host)s, %(port)s, %(username)s, %(password)s, %(ssl_mode)s,
    %(ignore_patterns)s, %(ignore_tables)s, %(include_tables)s
) ON CONFLICT (name) DO UPDATE SET
    host = EXCLUDED.host,
    port = EXCLUDED.port,
    username = EXCLUDED.username,
    password = EXCLUDED.password,
    ssl_mode = EXCLUDED.ssl_mode,
    ignore_patterns = EXCLUDED.ignore_patterns,
    ignore_tables = EXCLUDED.ignore_tables,
    include_tables = EXCLUDED.include_tables
RETURNING id
"""

[SELECT]
by_name = """
SELECT 
    id, ignore_patterns, ignore_tables, include_tables 
FROM "collector"."server"
WHERE  name       = %(name)s
  AND  deleted_at IS NULL
"""

by_server_id = """
SELECT id FROM "collector"."server"
WHERE id = %(server_id)s
AND deleted_at IS NULL
"""
