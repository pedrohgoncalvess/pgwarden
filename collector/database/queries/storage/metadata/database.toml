[SELECT]
default = """
SELECT
    md.id,
    md.oid,
    md.server_id,
    ms.name,
    ms.host,
    ms.port,
    ms.username,
    ms.password,
    ms.ssl_mode,
    ms.ignore_pattern,
    ms.ignore_tables,
    ms.include_tables,
    md.db_name
FROM "metadata"."database" md
JOIN "collector"."server" ms ON ms.id = md.server_id
WHERE md.is_active  = TRUE
  AND md.deleted_at IS NULL
  AND ms.deleted_at IS NULL
ORDER BY ms.name, md.db_name
"""

by_server_id = """
SELECT id, db_name FROM "metadata"."database"
WHERE server_id = %(server_id)s
AND deleted_at IS NULL
"""

by_id = """
SELECT * FROM "metadata"."database"
WHERE id = %(database_id)s
AND deleted_at IS NULL
"""

[INSERT]
default = """
INSERT INTO "metadata"."database" (server_id, db_name)
VALUES (%(server_id)s, %(db_name)s)
ON CONFLICT (server_id, db_name) DO NOTHING
RETURNING id
"""

[UPDATE]
last_seen = """
UPDATE "metadata"."database"
SET
    last_seen_at = CASE WHEN %(error)s::TEXT IS NULL THEN now() ELSE last_seen_at END,
    last_error   = %(error)s::TEXT,
    updated_at   = now()
WHERE id = %(id)s
"""

set_oid = """
UPDATE "metadata"."database"
SET
    oid = %(database_id)s,
    updated_at   = now()
WHERE id = %(id)s
"""
