services:
  db:
    image: timescale/timescaledb:latest-pg17
    container_name: pgwarden_db
    restart: unless-stopped
    ports:
      - "5436:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgwarden_data:/var/lib/postgresql/data
    networks:
      - pgwarden_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: ./migrations
      dockerfile: Dockerfile
    container_name: pgwarden_migrations
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_PORT=${DB_PORT:-5432}
    networks:
      - pgwarden_network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: [ "gunicorn", "main:app", "-k", "uvicorn.workers.UvicornWorker", "-w", "2", "-b", "0.0.0.0:8080", "--timeout", "120" ]
    container_name: pgwarden_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - PGWARDEN_EMAIL=${PGWARDEN_EMAIL:-admin@pgwarden.com}
      - PGWARDEN_PASSWORD=${PGWARDEN_PASSWORD:-admin}
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - pgwarden_network

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: pgwarden_collector
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_PORT=${DB_PORT:-5432}
    volumes:
      - ./config.yaml:/etc/pgwarden/config.yaml:ro
      - ./log:/log:rw
    networks:
      - pgwarden_network

networks:
  pgwarden_network:
    driver: bridge

volumes:
  pgwarden_data:
